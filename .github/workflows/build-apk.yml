name: 🔨 Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    paths:
      - 'admin-app/**'
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Setup Gradle Wrapper
        working-directory: admin-app
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
        continue-on-error: true

      - name: 🔐 Make gradlew Executable
        working-directory: admin-app
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        working-directory: admin-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 🏗️ Build Release APK (unsigned)
        working-directory: admin-app
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: 📁 Find APK Files
        run: |
          find admin-app -name "*.apk" -type f
          echo "APK_DEBUG=$(find admin-app -name '*debug*.apk' | head -1)" >> $GITHUB_ENV
          echo "APK_RELEASE=$(find admin-app -name '*release*.apk' | head -1)" >> $GITHUB_ENV

      - name: 📱 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WorldNewsAdmin-debug-${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ env.APK_DEBUG }}
          retention-days: 30

      - name: 📱 Upload Release APK
        uses: actions/upload-artifact@v4
        if: env.APK_RELEASE != ''
        with:
          name: WorldNewsAdmin-release-${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ env.APK_RELEASE }}
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: admin-v${{ github.event.inputs.version || '1.0.0' }}
          name: "📱 Admin App v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            ## 📱 لوحة تحكم بوابة الأنباء العالمية
            
            ### كيفية التثبيت:
            1. حمّل ملف `WorldNewsAdmin-debug.apk`
            2. على هاتفك: الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح ملف الـ APK وثبّته
            
            ### الميزات:
            - ✅ إضافة وتعديل وحذف الأخبار
            - ✅ إدارة التصنيفات
            - ✅ تشغيل بوت الأخبار يدوياً
            - ✅ بناء APK جديد من داخل التطبيق
            - ✅ تعديل ملفات الموقع مباشرة
            - ✅ عرض سجل GitHub Actions
          files: |
            ${{ env.APK_DEBUG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
