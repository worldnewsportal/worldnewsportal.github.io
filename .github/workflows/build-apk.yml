name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    paths:
      - 'admin-app/**'
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ANDROID_SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Using SDK: $ANDROID_SDK"
          ls "$ANDROID_SDK" || true
          # Accept licenses
          yes | "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || \
          yes | "$ANDROID_SDK/tools/bin/sdkmanager" --licenses 2>/dev/null || true
          # Install required components
          "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5 || true
          # Create local.properties
          echo "sdk.dir=$ANDROID_SDK" > admin-app/local.properties
          cat admin-app/local.properties

      - name: Download Gradle 8.4 and Generate Wrapper
        working-directory: admin-app
        run: |
          GRADLE_VERSION=8.4
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE_BIN="/tmp/gradle-${GRADLE_VERSION}/bin/gradle"
          chmod +x $GRADLE_BIN
          $GRADLE_BIN --version
          echo "Generating Gradle wrapper..."
          $GRADLE_BIN wrapper --gradle-version=${GRADLE_VERSION} --distribution-type=bin
          chmod +x gradlew
          ls -la gradle/wrapper/
          echo "Wrapper generated successfully."

      - name: Build Debug APK
        working-directory: admin-app
        run: |
          ANDROID_SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_HOME="$ANDROID_SDK"
          echo "Building with ANDROID_HOME=$ANDROID_HOME"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Find APK
        id: apk
        run: |
          APK=$(find admin-app -name "*.apk" -type f | head -1)
          echo "Found: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK" || echo "APK not found"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldNewsAdmin-v${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && steps.apk.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: admin-v${{ github.event.inputs.version || '1.0.0' }}
          name: "Admin App v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            ## لوحة تحكم بوابة الأنباء العالمية

            ### كيفية التثبيت:
            1. حمّل ملف APK من قسم Assets أدناه
            2. على هاتفك: الإعدادات - الأمان - السماح بمصادر غير معروفة
            3. افتح ملف الـ APK وثبّته

            ### الميزات:
            - اضافة وتعديل وحذف الأخبار
            - ادارة التصنيفات
            - تشغيل بوت الأخبار يدوياً
            - تعديل ملفات الموقع مباشرة
            - عرض سجل GitHub Actions
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
