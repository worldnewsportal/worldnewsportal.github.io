name: Auto Update AI News

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('stopwords', quiet=True)"

      - name: Run AI News Fetcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Verify Output
        run: python -c "import json,sys; d=json.load(open('news.json',encoding='utf-8')); print(f\"OK — {d.get('totalCount',0)} articles saved\")"

      - name: Commit and Push
        run: |
          git config --global user.name "AI-News-Bot"
          git config --global user.email "bot@news-portal.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No new articles this run."
          else
            COUNT=$(python -c "import json; print(json.load(open('news.json')).get('totalCount',0))")
            git commit -m "bot: update news archive [${COUNT} articles] $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
