name: Auto Update AI News

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # أضفنا المكتبات الجديدة هنا
        run: |
          pip install feedparser google-generativeai newspaper3k lxml nltk
          python -c "import nltk; nltk.download('punkt')"

      - name: Run AI News Fetcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'AI-News-Bot'
          git config --global user.email 'bot@yourdomain.com'
          git add news.json
          git commit -m "Auto-update 50 detailed news via AI" || echo "No changes to commit"
          git push
