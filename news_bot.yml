name: Auto Update AI News

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install feedparser==6.0.11
          pip install "google-generativeai>=0.8.0"
          pip install newspaper3k==0.2.8
          pip install "lxml>=5.0.0" lxml_html_clean
          pip install nltk requests Pillow
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('stopwords', quiet=True); print('NLTK OK')"

      - name: Run AI News Fetcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Verify news.json
        run: python -c "import json, sys; d=json.load(open('news.json',encoding='utf-8')); c=d.get('totalCount',0); print(f'news.json OK — {c} articles'); sys.exit(0)"

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'AI-News-Bot'
          git config --global user.email 'bot@news-portal.com'
          git add news.json
          if git diff --staged --quiet; then
            echo "No new articles this run"
          else
            COUNT=$(python -c "import json; print(json.load(open('news.json')).get('totalCount',0))")
            git commit -m "Auto-update: ${COUNT} articles — $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
